name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "版本号格式不正确，请使用例如 v1.0.0" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

  build:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build EXE
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name MHXYIncomeTracker main.py

      - name: Prepare release asset
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release
          cp "dist/MHXYIncomeTracker.exe" "release/MHXYIncomeTracker-${VERSION}-windows-x64.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          asset="$(find release -type f -name '*.exe' -print -quit)"
          notes=$'自动构建的 Windows 单文件版本。\n\n下载后直接双击运行 MHXYIncomeTracker.exe。'

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$asset#MHXYIncomeTracker.exe" --clobber
            gh release edit "$VERSION" --title "$VERSION" --notes "$notes"
          else
            gh release create "$VERSION" "$asset#MHXYIncomeTracker.exe" --title "$VERSION" --notes "$notes"
          fi
