name: UI Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  windows-ui-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run UI smoke test
        shell: bash
        run: |
          python tools/ui_layout_smoke.py
